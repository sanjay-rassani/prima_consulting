<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Django CSV Calculator{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f4f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .header {
            margin-bottom: 24px;
        }

        .nav {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #dbe3ee;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
        }

        h1, h2, h3, p {
            margin-top: 0;
        }

        .button {
            display: inline-block;
            border: 0;
            border-radius: 8px;
            background: #2563eb;
            color: #ffffff;
            padding: 12px 18px;
            font-size: 14px;
            cursor: pointer;
        }

        .button:hover {
            background: #1d4ed8;
        }

        .button-secondary {
            background: #e2e8f0;
            color: #1f2937;
            text-decoration: none;
        }

        .button-secondary:hover {
            background: #cbd5e1;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .field input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            box-sizing: border-box;
        }

        .helptext {
            display: block;
            margin-top: 6px;
            color: #475569;
            font-size: 14px;
        }

        .messages {
            list-style: none;
            padding: 0;
            margin: 0 0 20px;
        }

        .messages li {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #dcfce7;
            color: #166534;
        }

        .errorlist {
            color: #b91c1c;
            margin: 8px 0 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: top;
        }

        th {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #475569;
        }

        .muted {
            color: #64748b;
        }

        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            background: #e2e8f0;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-completed {
            background: #dcfce7;
            color: #166534;
        }

        .status-failed {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-processing,
        .status-uploaded {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .summary-item {
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #f8fafc;
        }

        .summary-label {
            display: block;
            color: #64748b;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
        }

        .summary-value {
            font-size: 20px;
            font-weight: 700;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .link-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="header">
            <h1>Django CSV Calculator POC</h1>
            <p class="muted">Workbook-driven CSV validation and calculation engine with persistent execution history.</p>
            <nav class="nav">
                <a class="button button-secondary" href="{% url 'executions:dashboard' %}">Dashboard</a>
                <a class="button button-secondary" href="{% url 'executions:history' %}">History</a>
            </nav>
        </div>

        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
